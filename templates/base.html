<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CityScout{% endblock %}</title>
    <style>
        :root {
            --bg: #fafaf7;
            --text: #2a2a2a;
            --muted: #6b6b6b;
            --accent: #c25b1d;
            --border: #e5e3dd;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        header { margin-bottom: 32px; }
        h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: -0.5px;
        }
        h1 a { color: var(--text); text-decoration: none; transition: color 0.15s; }
        h1 a:hover { color: var(--accent); }
        .tagline { color: var(--muted); font-size: 1.05rem; margin-top: 4px; }
        .back-link { margin: 0 0 8px; font-size: 0.95rem; }
        .back-link a { color: var(--accent); text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        h2 {
            font-size: 1.6rem;
            margin: 32px 0 8px;
        }
        h3 {
            font-size: 1.15rem;
            margin: 28px 0 10px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 4px;
            display: inline-block;
        }
        .place { margin-bottom: 16px; }
        .place-name { font-weight: 600; }
        .place-desc { color: var(--muted); }
        .empty { color: var(--muted); font-style: italic; }
        form {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        input[type=text] {
            flex: 1;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
        }
        button {
            padding: 12px 20px;
            font-size: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { opacity: 0.92; }
        .error {
            background: #fdf0ed;
            border-left: 3px solid var(--accent);
            padding: 12px 16px;
            margin-top: 20px;
            border-radius: 4px;
        }
        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">CityScout</a></h1>
            <div class="tagline">Travel recommendations grounded in real Reddit discussion.</div>
        </header>
        {% block content %}{% endblock %}
        <footer>
            Recommendations are AI-extracted from Reddit posts and comments.
        </footer>
    </div>
</body>
</html>
